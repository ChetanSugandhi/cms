spring.application.name=digital-cms
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/digital_cms?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

camunda.bpm.admin-user.id=admin
camunda.bpm.admin-user.password=admin
camunda.bpm.filter.create=All tasks
camunda.bpm.database.type=mysql
camunda.bpm.database.schema-update=true
camunda.bpm.generic-properties.properties.databaseSchemaUpdate=true
camunda.bpm.auto-deployment-enabled=true
camunda.bpm.deployment-resource-pattern=classpath*:bpmn/*.bpmn

minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=digital-cms-content

